<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peludos Jump - Turbo Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.55.2/phaser.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #05050a; touch-action: none; font-family: 'Arial Black', Gadget, sans-serif; }
        canvas { display: block; }
    </style>
</head>
<body>

<script>
const ADMIN_HASH = "MTIzNA==";

const config = {
    type: Phaser.AUTO,
    width: window.innerWidth,
    height: window.innerHeight,
    scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
    },
    physics: {
        default: 'arcade',
        arcade: { gravity: { y: 3200 }, debug: false } // Gravedad más pesada para control rápido
    },
    scene: { preload: preload, create: create, update: update }
};

const game = new Phaser.Game(config);

let player, ground, scoreText, highText, obstacles, emitter, titleText;
let score = 0;
let highScore = parseInt(localStorage.getItem('pixelJumpHighScore')) || 0;
let highName = localStorage.getItem('pixelJumpHighName') || "PLAYER";
let gameOver = false;
let gameSpeed = 650; // Velocidad inicial aumentada
let nextMilestone = 100;
let stars = [];

function preload() {
    let graphics = this.make.graphics({ x: 0, y: 0, add: false });
    graphics.fillStyle(0xffffff, 1);
    graphics.fillRect(0, 0, 4, 4);
    graphics.generateTexture('pixel', 4, 4);
}

function create() {
    const { width, height } = this.scale;
    
    // Fondo Estelar
    for (let i = 0; i < 100; i++) {
        let star = this.add.circle(Phaser.Math.Between(0, width), Phaser.Math.Between(0, height), Phaser.Math.Between(1, 2), 0x5555ff, Phaser.Math.FloatBetween(0.1, 0.4));
        stars.push({ obj: star, speed: Phaser.Math.FloatBetween(0.2, 1.5) });
    }

    ground = this.add.rectangle(width/2, height - 30, width, 60, 0x0a0a15);
    this.physics.add.existing(ground, true);
    this.add.rectangle(width/2, height - 60, width, 4, 0x00f3ff).setAlpha(0.3);

    titleText = this.add.text(width / 2, 70, '\nPELUDOS\nJUMP', { 
        font: 'bold 65px Arial Black', fill: '#ffffff',
    align: 'center'
    }).setOrigin(0.5);
    
    titleText.setShadow(4, 4, '#ff0055', 2, true, true);
    titleText.setStroke('#00f3ff', 8);

    highText = this.add.text(width / 2, 230, `🏆 BEST: ${highScore} - ${highName}`, { 
        font: 'bold 22px Courier New', fill: '#ffcc00' 
    }).setOrigin(0.5).setShadow(2, 2, '#000', 2);

    // Puntaje más visible (Alpha 0.1)
    scoreText = this.add.text(width / 2, height / 2 + 50, '0', { 
        font: 'bold 150px Arial Black', fill: '#ffffff' 
    }).setOrigin(0.5).setAlpha(0.1);

player = this.add.rectangle(150, height - 100, 40, 40, 0xff4444).setStrokeStyle(3, 0xffffff);
    this.physics.add.existing(player);
    player.body.setCollideWorldBounds(true);
    this.physics.add.collider(player, ground);

    let particles = this.add.particles('pixel');
    emitter = particles.createEmitter({
        speed: { min: -60, max: 60 },
        scale: { start: 1, end: 0 },
        lifespan: 500,
        frequency: 30,
        follow: player
    })

    this.input.on('pointerdown', (p) => {
        if (p.y < 150 && p.x > width - 100) return;
        if (player.body.touching.down && !gameOver) {
            player.body.setVelocityY(-1250); // Salto compensado para la nueva gravedad
            this.tweens.add({ targets: player, scaleX: 0.7, scaleY: 1.3, duration: 100, yoyo: true });
        }
    });

    obstacles = this.physics.add.group();
    spawnObstacle(this);

    let adminBtn = this.add.circle(width - 40, 40, 40, 0xffffff, 0).setInteractive();
    adminBtn.on('pointerdown', () => {
        let entry = prompt("ACCESO MAESTRO:");
        if (entry && btoa(entry) === ADMIN_HASH) { localStorage.clear(); location.reload(); }
    });
}

function spawnObstacle(scene) {
    if (gameOver) return;
    let size = Phaser.Math.Between(50, 85);
    let obs = scene.add.rectangle(scene.scale.width + 100, scene.scale.height - 60 - (size/2), size, size, 0xffffff).setAlpha(0.9);
    scene.physics.add.existing(obs);
    obs.body.setVelocityX(-gameSpeed);
    obs.body.setAllowGravity(false);
    scene.physics.add.overlap(player, obs, () => handleGameOver(scene, obs));
    
    // Frecuencia de aparición reducida (aparecen más seguido)
    let delay = Phaser.Math.Between(600, 1300) - (gameSpeed / 15);
    scene.time.addEvent({ delay: Math.max(450, delay), callback: () => spawnObstacle(scene) });
}

function handleGameOver(scene, hitObstacle) {
    if (gameOver) return;
    gameOver = true;
    emitter.stop();
    scene.cameras.main.shake(500, 0.04);
    scene.physics.pause();
    
    let color = player.fillColor;
    explodeSquare(scene, player, color);
    if (hitObstacle) explodeSquare(scene, hitObstacle, 0xffffff);

    let finalScore = Math.floor(score);
    if (finalScore > highScore) {
        let name = prompt(`¡NUEVO RÉCORD! ${finalScore}\nTu nombre:`, "PLAYER");
        highName = (name || "PLAYER").substring(0, 7).toUpperCase();
        localStorage.setItem('pixelJumpHighScore', finalScore);
        localStorage.setItem('pixelJumpHighName', highName);
    }

    scene.time.delayedCall(800, () => {
        const { width, height } = scene.scale;
        let isRecord = finalScore > highScore;
        let panel = scene.add.rectangle(width/2, height/2+120, 350, 280, 0x000000, 0.95).setStrokeStyle(4, color);
        
        scene.add.text(width/2, height/2+50, isRecord ? 'NUEVO RÉCORD' : 'GAME OVER', { 
            font: 'bold 40px Arial Black', fill: isRecord ? '#00ff88' : '#ff4444' 
        }).setOrigin(0.5);

        scene.add.text(width/2, height/2+120, `PUNTAJE: ${finalScore}\nBEST: ${localStorage.getItem('pixelJumpHighScore') || finalScore}`, { 
            font: '20px Courier New', fill: '#ffffff', align: 'center' 
        }).setOrigin(0.5);
        
let btn = scene.add.rectangle(width/2, height/2+195, 200, 50, color).setInteractive();

scene.add.text(width/2, height/2 + 195, 'REINTENTAR', {
    font: 'bold 20px Arial',
    fill: '#000'
}).setOrigin(0.5);

scene.tweens.add({
    targets: btn,
    alpha: 0.5,
    scaleX: 1.05,
    scaleY: 1.05,
    duration: 450,
    yoyo: true,
    repeat: -1
});

btn.on('pointerdown', () => location.reload());

// BOTON MENU
let bg = scene.add.graphics();

bg.fillStyle(0xffffff, 0.35);

bg.fillRoundedRect(
    width/2 - 100,
    height/2 + 288,
    200,
    25,
    20
);

let menuBtn = scene.add.rectangle(
    width/2,
    height/2 + 288,
    200,
    50,
    0xffffff,
    0
).setInteractive();

scene.add.text(width/2, height/2+300, 'IR A LA TIENDA', {
    font: 'bold 20px Arial',
    fill: '#000'
}).setOrigin(0.5);

menuBtn.on('pointerdown', () => {
    window.location.href = "index.html";
});

});
}
function explodeSquare(scene, target, color) {
    for (let i = 0; i < 25; i++) {
        let p = scene.add.rectangle(target.x, target.y, Phaser.Math.Between(4, 12), Phaser.Math.Between(4, 12), color);
        scene.physics.add.existing(p);
        p.body.setVelocity(Phaser.Math.Between(-700, 700), Phaser.Math.Between(-1000, 200));
        scene.tweens.add({ targets: p, alpha: 0, scale: 0, duration: 1200, onComplete: () => p.destroy() });
    }
    target.setVisible(false);
}

function update() {
    if (gameOver) return;

    stars.forEach(s => {
        s.obj.x -= s.speed;
        if (s.obj.x < 0) s.obj.x = this.scale.width;
    });

    // PUNTUACIÓN MÁS RÁPIDA: de 0.25 a 0.50 por frame
    score += 0.50;
    let currentScore = Math.floor(score);
    scoreText.setText(currentScore);

    if (highScore > 0) {
        let percent = currentScore / highScore;
        if (currentScore > highScore) {
            player.setFillStyle(0x00ff88);
            emitter.setTint(0x00ff88);
            titleText.setStroke('#00ff88', 8);
        } else if (percent >= 0.8) {
            player.setFillStyle(0xffff00);
            emitter.setTint(0xffff00);
            titleText.setStroke('#ffff00', 8);
        } else {
            player.setFillStyle(0xff4444);
            emitter.setTint(0xff4444);
            titleText.setStroke('#00f3ff', 8);
        }
    }

    if (currentScore >= nextMilestone) {
        gameSpeed += 80;
        nextMilestone += 150;
        this.cameras.main.flash(200, 255, 255, 255, 0.15);
    }
    
    if (!player.body.touching.down) player.angle += 8;
    else player.angle = 0;
}
</script>
</body>
</html>
