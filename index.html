<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peludos Shop | Accesorios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <img src="img/logo.PNG" alt="Peludos Shop" class="logo">

    <section class="bienvenida">
        <h2>¡Bienvenidos a Peludos Shop!</h2>
        <p>Calidad premium para tu mejor amigo</p>
    </section>

    <div id="btn-carrito-flotante" onclick="abrirCarrito()">
        🛒 <span id="contador-carrito">0</span>
    </div>

    <main id="catalogo"></main>

    <footer>
        <a href="https://www.instagram.com/peludosshoparg" target="_blank" class="instagram-link">
            <img src="img/logoInsta.PNG" alt="Instagram">
        </a>
        <span class="firma-3du">3DU.DESIGN</span>
    </footer>

    <div id="modal-carrito" class="modal-bg" onclick="cerrarCarrito()">
        <div class="contenido-carrito" onclick="event.stopPropagation()">
            <h3 style="margin-bottom:15px; border-bottom: 1px solid #eee;">Tu Pedido</h3>
            <div id="lista-carrito"></div>
            <div style="margin-top:15px; text-align:right; font-weight:bold; font-size:1.2rem;">
                Total: $<span id="precio-total">0</span>
            </div>
            <button onclick="enviarWhatsApp()" style="width:100%; background:#25D366; color:#fff; border:none; padding:15px; border-radius:8px; font-weight:bold; margin-top:15px;">Pedir por WhatsApp</button>
        </div>
    </div>

    <div id="modal-zoom" class="modal-bg" onclick="this.style.display='none'">
        <img id="imgG" src="" style="max-width:95%; border-radius:10px;">
    </div>

    <script src="script.js"></script>
</body>
</html>
